# This is a basic workflow to help you get started with Actions

name: Validate PR HEAD Branch

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the master branch
  pull_request:
    types: [opened, edited, reopened, synchronize]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "validate"
  validate:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - run: |
          if [[ "$(echo ${GITHUB_BASE_REF})" == "main" && "$(echo ${GITHUB_HEAD_REF})" != "staging" && "$(echo ${GITHUB_HEAD_REF} | cut -d "/" -f1)" != "hotfix" ]]; then
            echo "Only the 'staging' branch can be merged into 'main'."
            exit 1
          elif [[ "$(echo ${GITHUB_BASE_REF})" == "staging" && "$(echo ${GITHUB_HEAD_REF})" != "develop" ]]; then
            echo "Only the 'develop' branch can be merged into 'staging'."
            exit 1
          elif [[ "$(echo ${GITHUB_BASE_REF})" == "develop" && ! "$(echo ${GITHUB_HEAD_REF} | cut -d "/" -f1)" =~ (feature|bugfix|maint) ]]; then
            echo "Branches that will be merged into 'develop' must start with: feature/, bugfix/, or maint/."
            exit 1
          else
            echo "Branch validation complete."
          fi
        shell: bash