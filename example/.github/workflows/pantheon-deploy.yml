name: Deploy to Pantheon

on:
  # Only allow a push event on develop and multidev branches
  push:
    branches:
      - develop
      - feature/multidev/*

  # Run this workflow once the workflow "Pantheon Create Multidev Environment" is completed
  workflow_run:
    workflows: [Pantheon Create Multidev Environment]
    types:
      - completed

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    if: github.ref_name == 'develop' || startsWith(github.ref_name, 'feature/multidev/') && github.event.created != true
    steps:
      - uses: actions/checkout@v3

      - name: Build theme assets
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: wp-content/themes/[theme-folder]
      
      - name: Install JS deps and build theme assets
        run: |
          cd wp-content/themes/[theme-folder]
          npm i -ci 
          npm run build
          rm -rf node_modules/

      - name: Deploy to Pantheon
        uses: padillaco/pantheon-deploy-action@v2
        with:
          # Base directory for rsync
          base_directory: .

          # Destination directory for rsync in remote repository
          destination_directory: .

          # Comma-separated list of files and directories to exclude from sync
          exclude_list: .git, .github, .gitmodules, node_modules, .ddev

          # The Pantheon site ID to deploy to. Format: XXXXXXXX-XXXX-XXXX-XXXX-XXXXXXXXXXX
          pantheon_site_id: [pantheon-site-id]

          # SSH private key to use for remote repository authentication
          ssh_private_key: ${{ secrets.PANTHEON_SSH_PRIVATE_KEY }}
